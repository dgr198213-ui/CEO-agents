version: 2

updates:
  # ============================================================================
  # GitHub Actions
  # ============================================================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"

  # ============================================================================
  # Frontend (pnpm / npm)
  # ============================================================================
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(frontend)"
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
          - "next*"
      tailwind:
        patterns:
          - "tailwindcss*"
          - "@tailwindcss/*"
      tanstack:
        patterns:
          - "@tanstack/*"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
