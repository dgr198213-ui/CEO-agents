name: Release - Tags & Changelog

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versión a publicar (ej: v2.1.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================================
  # Crear Release con Changelog
  # ============================================================================
  create-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build release binaries
        run: |
          # Instalar Nim
          curl https://nim-lang.org/choosenim/init.sh -sSf | sh -s -- -y
          export PATH="$HOME/.nimble/bin:$PATH"
          mkdir -p bin
          nim c -d:release --opt:speed --hints:off --warnings:off -o:bin/ceo-api src/api_wrapper.nim
          tar -czf ceo-agents-linux-amd64.tar.gz bin/ src/ examples/ database/ README.md INSTALL.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "CEO-Agents ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CEO-Agents ${{ steps.version.outputs.VERSION }}

            ### Cambios en esta versión
            ${{ steps.changelog.outputs.CHANGES }}

            ### Instalación

            ```bash
            # Descargar y extraer
            tar -xzf ceo-agents-linux-amd64.tar.gz
            cd CEO-agents

            # Instalar y ejecutar
            ./install.sh
            ./bin/ceo-api
            ```

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            docker-compose up -d
            ```

            Ver [INSTALL.md](INSTALL.md) para instrucciones completas.
          files: |
            ceo-agents-linux-amd64.tar.gz
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true

  # ============================================================================
  # Publicar imagen Docker con tag de versión
  # ============================================================================
  docker-release:
    name: "Publish Docker Release Image"
    runs-on: ubuntu-latest
    needs: create-release
    timeout-minutes: 30
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push versioned image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
