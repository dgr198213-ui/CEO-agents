name: Security - Dependency & Static Analysis

on:
  schedule:
    - cron: "0 8 * * 1"  # Cada lunes a las 8:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ============================================================================
  # CodeQL - Análisis estático
  # ============================================================================
  codeql:
    name: "CodeQL Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ============================================================================
  # npm/pnpm Audit
  # ============================================================================
  npm-audit:
    name: "Frontend Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        working-directory: frontend
        run: |
          pnpm audit --audit-level=moderate --json > audit-report.json || true
          cat audit-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('metadata', {}).get('vulnerabilities', {})
          total = sum(vulns.values())
          if total > 0:
              print(f'Found {total} vulnerabilities:')
              for level, count in vulns.items():
                  if count > 0:
                      print(f'  {level}: {count}')
              high = vulns.get('high', 0) + vulns.get('critical', 0)
              if high > 0:
                  print(f'ERROR: {high} high/critical vulnerabilities found')
                  sys.exit(1)
          else:
              print('No vulnerabilities found')
          "

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend/audit-report.json
          retention-days: 30

  # ============================================================================
  # Secrets Detection
  # ============================================================================
  secrets-scan:
    name: "Secrets Detection"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # OSSF Scorecard
  # ============================================================================
  scorecard:
    name: "OSSF Scorecard"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true
