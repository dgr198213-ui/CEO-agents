# ============================================================================
# CEO-Agents - Railway Configuration
# ============================================================================
# Despliegue en Railway: https://railway.app
#
# Para desplegar:
#   1. Instala Railway CLI: npm install -g @railway/cli
#   2. Autentícate: railway login
#   3. Crea proyecto: railway init
#   4. Despliega: railway up
# ============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/ceo-api"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ceo-agents-api"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "/app/ceo-api"
healthcheckPath = "/api/v1/health"

[[services]]
name = "ceo-agents-frontend"

[services.build]
builder = "DOCKERFILE"
dockerfilePath = "frontend/Dockerfile"
buildArgs = { NEXT_PUBLIC_API_URL = "${{ceo-agents-api.RAILWAY_PUBLIC_DOMAIN}}" }

[services.deploy]
startCommand = "node server.js"
healthcheckPath = "/"
